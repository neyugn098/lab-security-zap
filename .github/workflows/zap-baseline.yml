name: ZAP DVWA Auth Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Cloudflare Quick Tunnel URL (without /DVWA)'
        required: true
        default: 'https://your-tunnel.trycloudflare.com'
  push:
    branches:
      - main

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://your-tunnel.trycloudflare.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace TARGET_URL in ZAP plan
        run: |
          sed "s|__TARGET_URL__|${TARGET_URL}|g" .zap/zap.yaml > .zap/zap-final.yaml
          echo "Using target: ${TARGET_URL}"

      - name: Run OWASP ZAP Automation Framework
        uses: zaproxy/action-af@v0.2.0
        with:
          plan: '.zap/zap-final.yaml'

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-auth-report
          path: |
            report_html.html
            report_md.md
            report_json.json
            zap.log
          if-no-files-found: warn
